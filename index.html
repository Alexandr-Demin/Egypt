<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0e0a06" />
  <title>SANDSLIDE</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles/style.css?v=20260707k" />
  <style>
    /* ===== Inline preload — appears instantly, no dependency on style.css ===== */
    #preload{
      position:fixed;inset:0;z-index:99999;
      background:radial-gradient(ellipse at 50% 35%, #2a1c0c 0%, #140d06 60%, #0a0603 100%);
      display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;
      transition:opacity .5s ease-out, visibility .5s ease-out;
      font-family:system-ui,'Segoe UI',sans-serif;color:#f3e6c8;
    }
    #preload.hide{opacity:0;visibility:hidden;pointer-events:none}
    #preload .pl-title{font-weight:900;letter-spacing:.32em;font-size:26px;color:#ffcf6b;
      text-shadow:0 2px 18px rgba(255,180,60,.4)}
    #preload .pl-bar{width:min(70vw,320px);height:10px;border-radius:99px;overflow:hidden;
      background:rgba(0,0,0,.45);border:1px solid rgba(255,207,107,.3)}
    #preload .pl-fill{height:100%;width:0%;border-radius:99px;
      background:linear-gradient(90deg,#ffcf6b,#e0972f);transition:width .28s cubic-bezier(.4,0,.2,1)}
    #preload .pl-tag{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(243,230,200,.6)}
  </style>
</head>
<body>
  <!-- Preload screen. main.js calls window.__egyptReady() when init is done. -->
  <div id="preload" role="status" aria-hidden="false">
    <div class="pl-title">SANDSLIDE</div>
    <div class="pl-bar"><div class="pl-fill" id="pl-fill"></div></div>
    <div class="pl-tag" id="pl-tag">Loading…</div>
  </div>
  <script>
    // Lightweight inline preloader. setTimeout (not RAF) so it ticks in hidden tabs.
    (function(){
      var fill=document.getElementById('pl-fill'), pre=document.getElementById('preload'),
          tag=document.getElementById('pl-tag');
      try{ if((localStorage.getItem('egypt.lang')||'en')==='ru') tag.textContent='Загрузка…'; }catch(e){}
      var start=Date.now(), done=false, cur=0;
      function set(p){ cur=p; fill.style.width=p+'%'; }
      (function tick(){ if(done) return;
        var p=Math.min(90,((Date.now()-start)/2200)*90); set(p);
        if(p<90) setTimeout(tick,33);
      })();
      window.__egyptReady=function(){
        if(done) return; done=true; var t0=Date.now(), from=cur;
        (function fin(){ var k=Math.min(1,(Date.now()-t0)/280); set(from+(100-from)*k);
          if(k<1) setTimeout(fin,33); else setTimeout(function(){ pre.classList.add('hide'); },220);
        })();
      };
      // Safety: never trap the player behind the splash.
      setTimeout(function(){ if(!done) window.__egyptReady(); }, 6000);
    })();
  </script>

  <!-- ================== APP ROOT ================== -->
  <div id="app" class="app">
    <main class="stage" id="stage">
      <canvas id="game-canvas"></canvas>
    </main>

    <!-- toasts / alerts -->
    <div class="alerts" id="alerts"></div>
    <div class="toasts" id="toasts"></div>
  </div>

  <script type="module" src="src/main.js?v=20260707k"></script>
</body>
</html>
