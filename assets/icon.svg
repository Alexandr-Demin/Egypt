<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241608"/>
      <stop offset="1" stop-color="#0a0603"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd87a"/>
      <stop offset="1" stop-color="#c98a25"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <circle cx="256" cy="150" r="58" fill="#ffcf6b" opacity="0.9"/>
  <!-- pyramid -->
  <polygon points="256,180 430,400 82,400" fill="url(#gold)"/>
  <polygon points="256,180 256,400 82,400" fill="#a8711d" opacity="0.55"/>
  <!-- horizon -->
  <rect x="0" y="400" width="512" height="40" fill="#7a5418" opacity="0.7"/>
</svg>
