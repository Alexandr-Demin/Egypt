<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SANDSLIDE — Level Editor</title>
<style>
  :root{ --bg:#0c0406; --panel:#160a0a; --ink:#f3e6c8; --muted:#9a7d6b;
         --gold:#ffd21e; --line:#3a1414; --red:#ff4030; --green:#5bd66b; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:'Segoe UI',system-ui,Arial,sans-serif; }
  .wrap{ display:flex; gap:16px; padding:14px; align-items:flex-start; flex-wrap:wrap; }
  h1{ font-size:15px; letter-spacing:.24em; color:var(--gold); margin:0 0 10px; font-weight:900; }
  .col{ display:flex; flex-direction:column; gap:10px; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .row{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  button, select{ background:#22100f; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:7px 10px; cursor:pointer; font-size:13px; }
  button:hover{ border-color:var(--gold); }
  button.on{ background:var(--gold); color:#1a0a0a; border-color:var(--gold); font-weight:700; }
  input[type=number]{ width:56px; background:#22100f; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px; }
  label{ font-size:12px; color:var(--muted); }
  canvas{ background:#0a0603; border:1px solid var(--line); border-radius:8px;
    image-rendering:pixelated; touch-action:none; cursor:crosshair; }
  .stat{ display:flex; justify-content:space-between; gap:12px; font-size:13px; padding:3px 0;
    border-bottom:1px dashed var(--line); }
  .stat b{ font-weight:700; }
  .ok{ color:var(--green); } .bad{ color:var(--red); } .mut{ color:var(--muted); }
  textarea{ width:340px; height:200px; background:#0a0603; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; font-family:ui-monospace,Consolas,monospace;
    font-size:12px; padding:8px; resize:vertical; }
  .hint{ font-size:11px; color:var(--muted); line-height:1.5; }
  .verdict{ font-size:14px; font-weight:800; letter-spacing:.06em; padding:6px 0; }
</style>
</head>
<body>
<div class="wrap">
  <!-- LEFT: tools -->
  <div class="col">
    <h1>SANDSLIDE · LEVEL EDITOR</h1>
    <div class="panel col">
      <div class="row" id="palette"></div>
      <div class="hint">Left-drag to paint · P/E are unique · right-drag = erase to floor</div>
    </div>
    <div class="panel col">
      <div class="row">
        <label>W</label><input type="number" id="w" min="5" max="40" value="13">
        <label>H</label><input type="number" id="h" min="5" max="60" value="18">
        <button id="resize">Resize</button>
        <button id="border">Border</button>
        <button id="clear">Clear</button>
      </div>
      <div class="row">
        <button id="chamber">+ Start chamber</button>
        <button id="pillar">+ Pillar room</button>
        <button id="donut">+ Donut room</button>
      </div>
      <div class="row">
        <label>Generate</label>
        <label>seed</label><input type="number" id="seed" value="7" style="width:70px">
        <label>diff</label><input type="number" id="diff" min="0" max="1" step="0.1" value="0.5">
        <button id="gen">Generate</button>
      </div>
      <div class="row">
        <label><input type="checkbox" id="showSol" checked> solution</label>
        <label><input type="checkbox" id="showCoins" checked> coins</label>
        <label><input type="checkbox" id="showTraps" checked> traps</label>
      </div>
    </div>
  </div>

  <!-- CENTER: canvas -->
  <div class="col">
    <canvas id="cv"></canvas>
  </div>

  <!-- RIGHT: validation + io -->
  <div class="col">
    <div class="panel col" style="width:340px">
      <div class="verdict" id="verdict">—</div>
      <div id="stats"></div>
    </div>
    <div class="panel col">
      <div class="row">
        <label>Name</label><input type="text" id="name" value="NEW LEVEL" style="flex:1;min-width:160px;background:#22100f;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px">
      </div>
      <textarea id="io" spellcheck="false"></textarea>
      <div class="row">
        <button id="export">Export ▸ box</button>
        <button id="copy">Copy</button>
        <button id="import">◂ Import from box</button>
      </div>
      <div class="hint">Export gives a paste-ready <code>const … = [ … ]</code> + LEVELS entry for src/levels.js.</div>
    </div>
  </div>
</div>

<script type="module">
import { PAL, sprite } from '../src/sprites.js';
import { validateLevel, generateLevel } from '../src/levelgen.js';

const CELL = 24;
const TOOLS = [
  { id:'#', name:'Wall',  col:'#d23a2a' },
  { id:'.', name:'Floor', col:'#20100f' },
  { id:'P', name:'Start', col:'#ffd21e' },
  { id:'E', name:'Exit',  col:'#ff7a5c' },
  { id:'X', name:'Mummy', col:'#efe2cf' },
  { id:'^', name:'Spike', col:'#e0d0c0' },
];
let W = 13, H = 18, tool = '#';
let grid = newGrid(W, H);

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);

// ---------- grid ----------
function newGrid(w, h){
  const g = Array.from({length:h}, (_,y)=>Array.from({length:w},(_,x)=>
    (x===0||y===0||x===w-1||y===h-1) ? '#' : '.'));
  return g;
}
function rows(){ return grid.map(r=>r.join('')); }
function setCell(x,y,ch){
  if(y<0||x<0||y>=H||x>=W) return;
  if(ch==='P'||ch==='E'){ for(let j=0;j<H;j++) for(let i=0;i<W;i++) if(grid[j][i]===ch) grid[j][i]='.'; }
  grid[y][x]=ch;
}

// ---------- local helpers (match game slide semantics) ----------
const isWall=(g,x,y)=> y<0||x<0||y>=g.length||x>=g[0].length || g[y][x]==='#';
function sweptCoins(g){
  const R=g.length,C=g[0].length; let P=null;
  for(let y=0;y<R;y++)for(let x=0;x<C;x++) if(g[y][x]==='P')P={x,y};
  if(!P) return new Set();
  const D=[[0,-1],[0,1],[-1,0],[1,0]], key=(x,y)=>x+','+y;
  const sw=new Set([key(P.x,P.y)]), seen=new Set([key(P.x,P.y)]), q=[[P.x,P.y]];
  while(q.length){ const [x,y]=q.shift();
    for(const [dx,dy] of D){ let nx=x,ny=y;
      while(!isWall(g,nx+dx,ny+dy)){ nx+=dx; ny+=dy; sw.add(key(nx,ny)); if(g[ny][nx]==='E') break; }
      const k=key(nx,ny); if((nx!==x||ny!==y)&&!seen.has(k)){ seen.add(k); q.push([nx,ny]); } } }
  const coins=new Set();
  for(const k of sw){ const [x,y]=k.split(',').map(Number);
    if(g[y][x]==='.'&&!(x===P.x&&y===P.y)) coins.add(k); }
  return coins;
}
function solvePath(g){
  const R=g.length,C=g[0].length; let P=null;
  for(let y=0;y<R;y++)for(let x=0;x<C;x++) if(g[y][x]==='P')P={x,y};
  if(!P) return null;
  const at=(x,y)=>isWall(g,x,y)?'#':g[y][x];
  const D={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]};
  const slide=(x,y,[dx,dy])=>{ let cx=x,cy=y,m=false;
    while(!isWall(g,cx+dx,cy+dy)){ cx+=dx; cy+=dy; m=true; if(g[cy][cx]==='E') return {win:1}; }
    return m?{x:cx,y:cy}:null; };
  const key=(x,y)=>x+','+y, prev=new Map([[key(P.x,P.y),null]]), q=[[P.x,P.y]];
  while(q.length){ const [x,y]=q.shift();
    for(const d in D){ const s=slide(x,y,D[d]); if(!s) continue;
      if(s.win){ const seq=[{x,y,d}]; let k=key(x,y);
        while(prev.get(k)){ const p=prev.get(k); seq.unshift({x:p.x,y:p.y,d:p.d}); k=key(p.x,p.y); }
        return seq; }
      const nk=key(s.x,s.y); if(!prev.has(nk)){ prev.set(nk,{x,y,d}); q.push([s.x,s.y]); } } }
  return null;
}

// ---------- render ----------
function render(){
  cv.width = W*CELL; cv.height = H*CELL;
  ctx.imageSmoothingEnabled = false;
  const v = validateLevel(rows());
  const coins = $('showCoins').checked ? sweptCoins(grid) : new Set();
  const traps = ($('showTraps').checked && v.traps) ? new Set(v.traps) : new Set();

  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const px=x*CELL, py=y*CELL, ch=grid[y][x];
    // base
    if(ch==='#'){ ctx.fillStyle='#180707'; ctx.fillRect(px,py,CELL,CELL);
      ctx.fillStyle='#3a1010'; ctx.fillRect(px,py,CELL,2); ctx.fillRect(px,py,2,CELL);
    } else { ctx.fillStyle=PAL.bg; ctx.fillRect(px,py,CELL,CELL); }
    // grid line
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.strokeRect(px+0.5,py+0.5,CELL-1,CELL-1);
    // trap highlight
    if(traps.has(x+','+y)){ ctx.fillStyle='rgba(255,64,48,0.42)'; ctx.fillRect(px,py,CELL,CELL); }
    // coin preview
    if(coins.has(x+','+y)){ ctx.fillStyle=PAL.gold; ctx.beginPath();
      ctx.arc(px+CELL/2,py+CELL/2,2.2,0,7); ctx.fill(); }
    // entities via real sprites
    const spr = ch==='P'?'anubis' : ch==='E'?'exit' : ch==='X'?'mummy' : ch==='^'?'spikes' : null;
    if(spr) ctx.drawImage(sprite(spr), px+2, py+2, CELL-4, CELL-4);
  }
  // solution overlay
  if($('showSol').checked){ const path=solvePath(grid);
    if(path){ ctx.strokeStyle='rgba(91,214,107,0.85)'; ctx.lineWidth=2; ctx.beginPath();
      const cx=(c)=>c*CELL+CELL/2;
      for(let i=0;i<path.length;i++){ const p=path[i];
        if(i===0) ctx.moveTo(cx(p.x),cx(p.y)); else ctx.lineTo(cx(p.x),cx(p.y)); }
      ctx.stroke(); } }
  paintPanel(v, coins.size);
}
function paintPanel(v, coinCount){
  const path = solvePath(grid);
  const verdict = $('verdict');
  const good = v.ok;
  verdict.textContent = good ? '✔ VALID LEVEL' : '✘ NOT SHIPPABLE';
  verdict.className = 'verdict ' + (good ? 'ok' : 'bad');
  const line = (label, val, ok) =>
    `<div class="stat"><span class="mut">${label}</span><b class="${ok?'ok':'bad'}">${val}</b></div>`;
  const neutral = (label,val)=>`<div class="stat"><span class="mut">${label}</span><b>${val}</b></div>`;
  $('stats').innerHTML =
    line('Start / Exit', (v.hasP?'P':'—')+' / '+(v.hasE?'E':'—'), v.hasP&&v.hasE) +
    line('Uniform width', v.widthsOk?'yes':'no', v.widthsOk) +
    line('Solvable', v.solvable?'yes':'no', v.solvable) +
    line('Dead-end traps', v.traps ? v.traps.length : '—', (v.traps&&v.traps.length===0)) +
    line('Pyramid grounded', v.grounded?'yes':'no', v.grounded) +
    neutral('Enemies', v.enemies) +
    (v.enemies ? line('Avoidable (go-around)', v.enemyAvoidable?'yes':'no', v.enemyAvoidable) : '') +
    neutral('Min swipes', path ? path.length : (v.minSwipes ?? '—')) +
    neutral('Coins (auto)', coinCount) +
    neutral('Size', v.rows+' × '+v.cols);
}

// ---------- palette ----------
const pal = $('palette');
TOOLS.forEach(t=>{ const b=document.createElement('button');
  b.textContent = t.name + '  ' + t.id; b.dataset.id=t.id;
  b.onclick = ()=>{ tool=t.id; [...pal.children].forEach(c=>c.classList.toggle('on', c.dataset.id===tool)); };
  if(t.id==='#') b.classList.add('on');
  pal.appendChild(b); });

// ---------- painting ----------
let painting=false, eraseMode=false;
function cellAt(ev){ const r=cv.getBoundingClientRect();
  return { x: Math.floor((ev.clientX-r.left)/(r.width/W)), y: Math.floor((ev.clientY-r.top)/(r.height/H)) }; }
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('pointerdown', e=>{ painting=true; eraseMode = e.button===2;
  const {x,y}=cellAt(e); setCell(x,y, eraseMode?'.':tool); render(); });
cv.addEventListener('pointermove', e=>{ if(!painting) return;
  const {x,y}=cellAt(e); setCell(x,y, eraseMode?'.':tool); render(); });
addEventListener('pointerup', ()=>{ painting=false; save(); });

// ---------- toolbar actions ----------
$('resize').onclick = ()=>{ const nw=+$('w').value, nh=+$('h').value;
  const ng=newGrid(nw,nh);
  for(let y=0;y<Math.min(H,nh);y++) for(let x=0;x<Math.min(W,nw);x++) ng[y][x]=grid[y][x];
  W=nw; H=nh; grid=ng; render(); save(); };
$('border').onclick = ()=>{ for(let x=0;x<W;x++){ grid[0][x]='#'; grid[H-1][x]='#'; }
  for(let y=0;y<H;y++){ grid[y][0]='#'; grid[y][W-1]='#'; } render(); save(); };
$('clear').onclick = ()=>{ grid=newGrid(W,H); render(); save(); };

// stamps (write ASCII blocks into the grid, top-anchored, centred horizontally)
function stampRows(block){ const y0=Math.max(1,H-block.length-1), x0=Math.max(0,((W-block[0].length)/2)|0);
  for(let j=0;j<block.length;j++) for(let i=0;i<block[j].length;i++){
    const ch=block[j][i]; if(ch!==' ') setCell(x0+i, y0+j, ch); } render(); save(); }
$('chamber').onclick = ()=> stampRows(['#....#','#....#','#....#','#.P..#','######']);
$('pillar').onclick  = ()=> stampRows(['#...........#','#....###....#','#....###....#','#....###....#','#...........#']);
$('donut').onclick   = ()=> stampRows(['#...........#','#...#####...#','#...#####...#','#...#####...#','#...........#']);

$('gen').onclick = ()=>{ const lvl = generateLevel({ seed:+$('seed').value|0, difficulty:+$('diff').value });
  if(!lvl){ alert('generation failed'); return; }
  grid = lvl.rows.map(r=>r.split('')); H=grid.length; W=grid[0].length;
  $('w').value=W; $('h').value=H; if(lvl.name) $('name').value=lvl.name; render(); save(); };

['showSol','showCoins','showTraps'].forEach(id=>$(id).addEventListener('change',render));

// ---------- import / export ----------
function ident(){ return (($('name').value||'LEVEL').toUpperCase().replace(/[^A-Z0-9]+/g,'_')).replace(/^_|_$/g,'') || 'LEVEL'; }
$('export').onclick = ()=>{ const id=ident();
  const body = rows().map(r=>`  '${r}',`).join('\n');
  $('io').value = `const ${id} = [\n${body}\n];\n\n// in the LEVELS array:\n  { name: '${$('name').value}', map: ${id} },`;
};
$('copy').onclick = async ()=>{ try{ await navigator.clipboard.writeText($('io').value); $('copy').textContent='Copied!';
  setTimeout(()=>$('copy').textContent='Copy',900);}catch(e){} };
$('import').onclick = ()=>{ const m=[...$('io').value.matchAll(/'([^']*)'/g)].map(x=>x[1]).filter(s=>/^[#.PEX^ ]+$/.test(s));
  if(!m.length){ alert('no rows found in box'); return; }
  const w=Math.max(...m.map(r=>r.length)); grid=m.map(r=>(r+'#'.repeat(w)).slice(0,w).split(''));
  H=grid.length; W=w; $('w').value=W; $('h').value=H; render(); save(); };

// ---------- persistence (separate key; never touches the game save) ----------
const KEY='sandslide.editor.wip';
function save(){ try{ localStorage.setItem(KEY, JSON.stringify({W,H,grid,name:$('name').value})); }catch(e){} }
function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)||'null');
  if(s&&s.grid){ W=s.W;H=s.H;grid=s.grid; $('w').value=W;$('h').value=H; if(s.name)$('name').value=s.name; } }catch(e){} }

load(); render();
// tiny hook for automated checks
window.__editor = { rows, validate:()=>validateLevel(rows()), setGrid:g=>{grid=g.map(r=>r.split(''));H=grid.length;W=grid[0].length;render();} };
</script>
</body>
</html>
